name: Update GM Paewang Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: update-gm-paewang-posts
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Collect GM Paewang posts
        env:
          GM_OUTPUT: gm-paewang-posts.json
          GM_MAX_POSTS: "40"
          GM_MAX_NEW_DETAILS: "20"
        run: python scripts/update_gm_paewang_playwright.py

      - name: Commit updated JSON safely
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 수집 결과를 임시 보관
          cp gm-paewang-posts.json /tmp/gm-paewang-posts.json

          # 실행 중 다른 커밋이 main에 들어와도 최대 3번 다시 맞춰서 push
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"

            git fetch origin main
            git reset --hard origin/main

            # 원격 최신 상태 위에 수집한 JSON만 다시 적용
            cp /tmp/gm-paewang-posts.json gm-paewang-posts.json

            if git diff --quiet -- gm-paewang-posts.json; then
              echo "No GM Paewang changes"
              exit 0
            fi

            git add gm-paewang-posts.json
            git commit -m "Update GM Paewang posts"

            if git push origin HEAD:main; then
              echo "GM Paewang JSON pushed successfully"
              exit 0
            fi

            echo "Remote changed during push. Retrying..."
            sleep 3
          done

          echo "Failed to push after 3 attempts"
          exit 1
