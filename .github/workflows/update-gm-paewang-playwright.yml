name: Update GM Paewang Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Collect GM Paewang posts
        env:
          GM_OUTPUT: gm-paewang-posts.json
          GM_MAX_POSTS: "40"
          GM_MAX_NEW_DETAILS: "20"
        run: python scripts/update_gm_paewang_playwright.py

      - name: Commit updated JSON
        run: |
          if git diff --quiet -- gm-paewang-posts.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gm-paewang-posts.json
          git commit -m "Update GM Paewang posts"
          git push

