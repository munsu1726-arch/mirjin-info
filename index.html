<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미르의전설: 진 정보 검색</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    header {
      padding: 40px 20px;
      text-align: center;
      background: #1f2937;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .search-box {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters button {
      margin: 4px;
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #374151;
      color: white;
    }

    .filters button:hover {
      background: #4b5563;
    }

    .card {
      background: #1f2937;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid #374151;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .tags {
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 4px;
    }

    .empty {
      color: #9ca3af;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>미르의전설: 진 정보 검색</h1>
    <p>공지, 공략, 쿠폰, 카카오톡 정리 내용을 검색합니다.</p>
  </header>

  <main>
    <input
      id="searchInput"
      class="search-box"
      type="text"
      placeholder="검색어를 입력하세요. 예: 쿠폰, 궁수, 사냥터, 보스, 강화"
    />

    <div class="filters">
      <button onclick="setCategory('전체')">전체</button>
      <button onclick="setCategory('공지')">공지</button>
      <button onclick="setCategory('쿠폰')">쿠폰</button>
      <button onclick="setCategory('육성')">육성</button>
      <button onclick="setCategory('장비')">장비</button>
      <button onclick="setCategory('보스')">보스</button>
      <button onclick="setCategory('카톡정리')">카톡정리</button>
    </div>

    <div id="results"></div>
  </main>

  <script>
    const posts = [
      {
        title: "쿠폰 입력 위치 정리",
        category: "쿠폰",
        source: "유저정리",
        date: "2026-07-08",
        content: "쿠폰은 게임 내 이벤트 메뉴 또는 쿠폰 교환 메뉴에서 입력할 수 있습니다. 서버와 캐릭터 선택 여부를 꼭 확인하세요.",
        tags: ["쿠폰", "보상", "이벤트"]
      },
      {
        title: "초반 레벨업 루트",
        category: "육성",
        source: "카톡정리",
        date: "2026-07-08",
        content: "초반에는 메인 퀘스트를 우선 진행하고, 막히는 구간에서는 사냥터보다 퀘스트 보상 경험치를 먼저 확인하는 것이 좋습니다.",
        tags: ["초반", "레벨업", "사냥터", "육성"]
      },
      {
        title: "궁수 초반 장비 세팅",
        category: "장비",
        source: "카톡정리",
        date: "2026-07-08",
        content: "궁수는 초반에 퀘스트 보상 장비를 우선 사용하고, 강화 재료는 무리하게 사용하지 않는 것이 좋습니다.",
        tags: ["궁수", "장비", "강화", "초반"]
      }
    ];

    let currentCategory = "전체";

    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");

    function setCategory(category) {
      currentCategory = category;
      render();
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();

      const filtered = posts.filter(post => {
        const matchCategory =
          currentCategory === "전체" || post.category === currentCategory;

        const targetText = [
          post.title,
          post.category,
          post.source,
          post.content,
          post.tags.join(" ")
        ].join(" ").toLowerCase();

        const matchKeyword =
          keyword === "" || targetText.includes(keyword);

        return matchCategory && matchKeyword;
      });

      if (filtered.length === 0) {
        results.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }

      results.innerHTML = filtered.map(post => `
        <div class="card">
          <h2>${post.title}</h2>
          <div class="meta">
            ${post.category} · ${post.source} · ${post.date}
          </div>
          <p>${post.content}</p>
          <div class="tags">
            ${post.tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
          </div>
        </div>
      `).join("");
    }

    searchInput.addEventListener("input", render);

    render();
  </script>
</body>
</html>
