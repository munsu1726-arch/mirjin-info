<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미르의전설: 진 5서버 아라 문파 정보 검색</title>

  <style>
    body {
      margin: 0;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, sans-serif;
    }

    .hero-search {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url("intro.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      animation: introMove 5s ease forwards;
    }

    .hero-pixel {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1.5px),
        radial-gradient(circle, rgba(0,0,0,0.35) 1px, transparent 1.5px);
      background-size: 5px 5px, 8px 8px;
      background-position: 0 0, 3px 3px;
      opacity: 0;
      mix-blend-mode: overlay;
      animation: pixelMove 5s ease forwards;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(17,24,39,0.92)),
        radial-gradient(circle at center, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
    }

    .hero-box {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      opacity: 0;
      transform: translateY(24px);
      animation: heroTextIn 1s ease forwards;
      animation-delay: 1.5s;
    }

    .hero-box h1 {
      margin: 0 0 12px;
      font-size: 38px;
      color: white;
      text-shadow: 0 0 14px rgba(0,0,0,0.95);
    }

    .hero-box p {
      margin: 0 0 28px;
      color: #e5e7eb;
      font-size: 17px;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    .search-box {
      width: 100%;
      padding: 18px 20px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      outline: none;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px 60px;
    }

    .card {
      background: #1f2937;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid #374151;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 4px;
      margin-top: 4px;
    }

    .empty {
      color: #9ca3af;
      text-align: center;
      margin-top: 20px;
    }

    @keyframes introMove {
      0% {
        filter: blur(0px) brightness(1.1);
        transform: scale(1.02);
      }

      60% {
        filter: blur(3px) brightness(1.25);
        transform: scale(1.1);
      }

      100% {
        filter: blur(2px) brightness(0.78);
        transform: scale(1.06);
      }
    }

    @keyframes pixelMove {
      0% {
        opacity: 0;
        background-size: 4px 4px, 7px 7px;
      }

      60% {
        opacity: 0.65;
        background-size: 12px 12px, 16px 16px;
      }

      100% {
        opacity: 0.2;
        background-size: 7px 7px, 11px 11px;
      }
    }

    @keyframes heroTextIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .hero-box h1 {
        font-size: 26px;
      }

      .hero-box p {
        font-size: 14px;
      }

      .search-box {
        font-size: 16px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <section class="hero-search">
    <div class="hero-bg"></div>
    <div class="hero-pixel"></div>
    <div class="hero-overlay"></div>

    <div class="hero-box">
      <h1>미르의전설: 진 5서버 아라 문파 정보 검색</h1>
      <p>공지, 공략, 쿠폰, 카카오톡 정리 내용을 검색합니다.</p>

      <input
        id="searchInput"
        class="search-box"
        type="text"
        placeholder="검색어를 입력하세요. 예: 쿠폰, 공수, 사냥터, 보스, 강화"
      />
    </div>
  </section>

  <main>
    <div id="results"></div>
  </main>

  <script>
    const posts = [
      {
        title: "쿠폰 입력 위치 정리",
        category: "쿠폰",
        source: "유저정리",
        date: "2026-07-08",
        content: "쿠폰은 게임 내 이벤트 메뉴 또는 쿠폰 교환 메뉴에서 입력할 수 있습니다. 서버와 캐릭터 선택 여부를 꼭 확인하세요.",
        tags: ["쿠폰", "보상", "이벤트"]
      },
      {
        title: "초반 레벨업 루트",
        category: "육성",
        source: "카톡정리",
        date: "2026-07-08",
        content: "초반에는 메인 퀘스트를 우선 진행하고, 막히는 구간에서는 사냥터보다 퀘스트 보상 경험치를 먼저 확인하는 것이 좋습니다.",
        tags: ["초반", "레벨업", "사냥터", "육성"]
      },
      {
        title: "궁수 초반 장비 세팅",
        category: "장비",
        source: "카톡정리",
        date: "2026-07-08",
        content: "궁수는 초반에 퀘스트 보상 장비를 우선 사용하고, 강화 재료는 무리하게 사용하지 않는 것이 좋습니다.",
        tags: ["궁수", "장비", "강화", "초반"]
      }
    ];

    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();

      if (keyword === "") {
        results.innerHTML = "";
        return;
      }

      const filtered = posts.filter(post => {
        const targetText = [
          post.title,
          post.category,
          post.source,
          post.content,
          post.tags.join(" ")
        ].join(" ").toLowerCase();

        return targetText.includes(keyword);
      });

      if (filtered.length === 0) {
        results.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }

      results.innerHTML = filtered.map(post => `
        <div class="card">
          <h2>${post.title}</h2>
          <div class="meta">
            ${post.category} · ${post.source} · ${post.date}
          </div>
          <p>${post.content}</p>
          <div>
            ${post.tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
          </div>
        </div>
      `).join("");

      results.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    searchInput.addEventListener("input", render);

    render();
  </script>
</body>
</html>
