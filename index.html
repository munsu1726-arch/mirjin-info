      {
            "title": "3차 - 원스토어 페이백과 할인쿠폰",
            "category": "결제",
            "source": "카카오톡정리 3차",
            "date": "2026-06-09",
            "content": "원스토어 페이백 20%, 원스토어 50%/30% 할인 쿠폰 이야기가 공유되었습니다. 결제 전 원스토어 이벤트와 할인쿠폰 여부를 확인하세요.",
            "tags": [
                  "원스토어",
                  "페이백",
                  "20퍼",
                  "50퍼",
                  "30퍼",
                  "할인쿠폰",
                  "결제"
            ]
      },
      {
            "title": "3차 - 원스토어 결제 쿠폰 사용 조건",
            "category": "결제",
            "source": "카카오톡정리 3차",
            "date": "2026-06-09",
            "content": "원스토어 결제 쿠폰을 쓰려면 원스토어에서 게임을 설치해야 결제 시 쿠폰이 뜬다는 대화가 있었습니다. 아이폰 사용자는 원스토어 이용이 어렵다는 언급도 있었습니다.",
            "tags": [
                  "원스토어",
                  "설치",
                  "결제쿠폰",
                  "아이폰",
                  "쿠폰",
                  "결제"
            ]
      }

    ];

    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");
    const popularList = document.getElementById("popularList");

    const POPULAR_STORAGE_KEY = "mirjinAraPopularSearches";
    const defaultPopularKeywords = [
      { keyword: "GM패왕", count: 50 },
      { keyword: "쿠폰", count: 40 },
      { keyword: "공성", count: 30 },
      { keyword: "보스", count: 20 },
      { keyword: "스킬북", count: 10 }
    ];

    let searchRecordTimer = null;
    let lastRecordedKeyword = "";

    function getPopularStats() {
      let stats = {};

      try {
        stats = JSON.parse(localStorage.getItem(POPULAR_STORAGE_KEY)) || {};
      } catch (error) {
        stats = {};
      }

      defaultPopularKeywords.forEach(item => {
        if (!stats[item.keyword]) {
          stats[item.keyword] = item.count;
        }
      });

      return stats;
    }

    function savePopularStats(stats) {
      localStorage.setItem(POPULAR_STORAGE_KEY, JSON.stringify(stats));
    }

    function getTopPopularKeywords() {
      const stats = getPopularStats();

      return Object.entries(stats)
        .filter(([keyword]) => keyword.trim().length > 0)
        .sort((a, b) => {
          if (b[1] !== a[1]) return b[1] - a[1];
          return a[0].localeCompare(b[0], "ko");
        })
        .slice(0, 5)
        .map(([keyword, count]) => ({ keyword, count }));
    }

    function renderPopularKeywords() {
      const topKeywords = getTopPopularKeywords();

      popularList.innerHTML = topKeywords.map((item, index) => `
        <button class="popular-keyword" type="button" onclick="searchKeyword('${item.keyword.replace(/'/g, "\\'")}')">
          <span class="popular-rank">${index + 1}위</span>
          ${item.keyword}
          <span class="popular-count">${item.count}회</span>
        </button>
      `).join("");
    }

    function recordSearchKeyword(keyword) {
      const cleanKeyword = keyword.trim();

      if (cleanKeyword.length < 2) {
        return;
      }

      const stats = getPopularStats();
      stats[cleanKeyword] = (stats[cleanKeyword] || 0) + 1;
      savePopularStats(stats);
      renderPopularKeywords();
    }

    function scheduleSearchRecord() {
      const keyword = searchInput.value.trim();

      clearTimeout(searchRecordTimer);

      if (keyword.length < 2) {
        return;
      }

      searchRecordTimer = setTimeout(() => {
        const currentKeyword = searchInput.value.trim();

        if (currentKeyword.length >= 2 && currentKeyword !== lastRecordedKeyword) {
          recordSearchKeyword(currentKeyword);
          lastRecordedKeyword = currentKeyword;
        }
      }, 900);
    }

    function searchKeyword(keyword) {
      searchInput.value = keyword;
      recordSearchKeyword(keyword);
      lastRecordedKeyword = keyword;
      render();
      searchInput.focus();
    }

    function normalizeText(text) {
      return String(text)
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[·ㆍ:：,\.\-_/]/g, "");
    }

    function render() {
      const keyword = searchInput.value.trim();
      const normalizedKeyword = normalizeText(keyword);

      if (keyword === "") {
        results.innerHTML = "";
        return;
      }

      const filtered = posts.filter(post => {
        const targetText = [
          post.title,
          post.category,
          post.source,
          post.date,
          post.content,
          post.url || "",
          post.tags.join(" ")
        ].join(" ");

        return normalizeText(targetText).includes(normalizedKeyword);
      });

      if (filtered.length === 0) {
        results.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }

      results.innerHTML = `
        <div class="result-summary">총 ${filtered.length}개의 검색 결과</div>
        ${filtered.map(post => `
          <article class="card">
            <h2>${post.title}</h2>
            <div class="meta">${post.category} · ${post.source} · ${post.date}</div>
            <p>${post.content}</p>
            ${post.url ? `<a class="post-link" href="${post.url}" target="_blank" rel="noopener noreferrer">원문/바로가기 열기</a>` : ""}
            <div>
              ${post.tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
            </div>
          </article>
        `).join("")}
      `;

      results.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    searchInput.addEventListener("input", () => {
      render();
      scheduleSearchRecord();
    });

    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        const keyword = searchInput.value.trim();

        if (keyword.length >= 2) {
          recordSearchKeyword(keyword);
          lastRecordedKeyword = keyword;
        }
      }
    });

    renderPopularKeywords();
    render();
  </script>
</body>
</html>
