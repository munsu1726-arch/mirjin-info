    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");

    function normalizeText(text) {
      return String(text)
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[·ㆍ:：,\.\-_/]/g, "");
    }

    function render() {
      const keyword = searchInput.value.trim();
      const normalizedKeyword = normalizeText(keyword);

      if (keyword === "") {
        results.innerHTML = "";
        return;
      }

      const filtered = posts.filter(post => {
        const targetText = [
          post.title,
          post.category,
          post.source,
          post.date,
          post.content,
          post.tags.join(" ")
        ].join(" ");

        return normalizeText(targetText).includes(normalizedKeyword);
      });

      if (filtered.length === 0) {
        results.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }

      results.innerHTML = `
        <div class="result-summary">총 ${filtered.length}개의 검색 결과</div>
        ${filtered.map(post => `
          <article class="card">
            <h2>${post.title}</h2>
            <div class="meta">${post.category} · ${post.source} · ${post.date}</div>
            <p>${post.content}</p>
            <div>
              ${post.tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
            </div>
          </article>
        `).join("")}
      `;

      results.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    searchInput.addEventListener("input", render);
    render();
  </script>
