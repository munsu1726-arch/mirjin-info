        stats = {};

      defaultPopularKeywords.forEach(item => {
        if (!stats[item.keyword]) {
          stats[item.keyword] = item.count;
        }
      });

      return stats;

        .sort((a, b) => {

          return a[0].localeCompare(b[0], "ko");

        .slice(0, 5)

    function toKoreanJamo(value) {
      const cho = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
      const jung = ["ㅏ", "ㅐ", "ㅑ", "ㅒ", "ㅓ", "ㅔ", "ㅕ", "ㅖ", "ㅗ", "ㅘ", "ㅙ", "ㅚ", "ㅛ", "ㅜ", "ㅝ", "ㅞ", "ㅟ", "ㅠ", "ㅡ", "ㅢ", "ㅣ"];
      const jong = ["", "ㄱ", "ㄲ", "ㄳ", "ㄴ", "ㄵ", "ㄶ", "ㄷ", "ㄹ", "ㄺ", "ㄻ", "ㄼ", "ㄽ", "ㄾ", "ㄿ", "ㅀ", "ㅁ", "ㅂ", "ㅄ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];

      return String(value || "").split("").map(char => {
        const code = char.charCodeAt(0);
        if (code < 0xac00 || code > 0xd7a3) {
          return char;
        }

        const index = code - 0xac00;
        const choIndex = Math.floor(index / 588);
        const jungIndex = Math.floor((index % 588) / 28);
        const jongIndex = index % 28;
        return cho[choIndex] + jung[jungIndex] + jong[jongIndex];
      }).join("");
    }

      chatMessages.innerHTML = "";

      if (!messages.length) {
        chatMessages.innerHTML = `<div class="chat-empty">아직 채팅이 없습니다.</div>`;
        return;
      }

      messages.forEach(message => {
        const item = document.createElement("div");
        item.className = `chat-message ${message.userId === myChatId ? "mine" : ""}`;
        item.innerHTML = `
          <div class="chat-meta">
            <span class="chat-name">${escapeHtml(getSafeChatName(message.name || "익명"))}</span>
            <span class="chat-time">${formatChatTime(message.createdAt)}</span>
          </div>
          <p class="chat-text">${escapeHtml(getSafeChatText(message.text || ""))}</p>
        `;
        chatMessages.appendChild(item);
      });

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getLocalChatMessages() {
      try {
        return JSON.parse(localStorage.getItem("mirjin_local_chat_messages") || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveLocalChatMessages(messages) {
      localStorage.setItem("mirjin_local_chat_messages", JSON.stringify(messages.slice(-MAX_CHAT_MESSAGES)));
    }

    function getCleanChatInput() {
      const rawName = chatName.value.trim();
      const rawText = chatText.value.trim();
      const name = (rawName || "익명").slice(0, 12);
      const text = rawText.slice(0, 200);
      return { rawName, rawText, name, text };
    }

    function setChatStatus(message) {
      chatStatus.textContent = message;
    }

    function startLocalChatMode() {
      setChatStatus("테스트 모드: 내 기기에서만 보임");
      const localMessages = getLocalChatMessages();
      renderChatMessages(localMessages);
      syncLocalChatMessagesToSearchPosts(localMessages);

      chatForm.addEventListener("submit", event => {
        event.preventDefault();
        const { rawName, rawText, name, text } = getCleanChatInput();

        if (!text) {
          return;
        }

        if (!isValidChatName(rawName)) {
          rejectBlockedChatName();
          return;
        }

        if (containsBlockedExpression(rawText)) {
          rejectBlockedChatMessage();
          return;
        }

        localStorage.setItem(CHAT_NAME_KEY, name);
        const messages = getLocalChatMessages();
        messages.push({
          name,
          text,
          userId: myChatId,
          createdAt: Date.now()
        });
        saveLocalChatMessages(messages);
        renderChatMessages(messages);
        syncLocalChatMessagesToSearchPosts(messages);
        chatText.value = "";
        chatText.focus();
      });
    }

    function waitWithTimeout(promise, timeoutMs) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error("timeout")), timeoutMs);
        })
      ]);
    }

    /*
      Firebase SDK 실시간 연결이 일부 호스팅/브라우저 환경에서 계속 "연결 중"으로 멈추는 경우가 있어,
      이 버전은 Realtime Database REST API + 2초 자동 새로고침 방식으로 동작합니다.
      별도 SDK import가 없어서 GitHub Pages, 일반 웹호스팅, 로컬 테스트에서 더 안정적입니다.
    */
    const CHAT_DATABASE_URL = firebaseConfig.databaseURL.replace(/\/$/, "");
    let chatRefreshTimer = null;
    let lastRenderedChatSignature = "";
    let lastRenderedSearchPostsSignature = "";

    function getChatRestUrl() {
      return `${CHAT_DATABASE_URL}/${CHAT_ROOM_PATH}.json`;
    }

    function getSearchPostsRestUrl() {
      return `${CHAT_DATABASE_URL}/${SEARCH_POSTS_PATH}.json`;
    }

    function getSearchPostRestUrl(key) {
      return `${CHAT_DATABASE_URL}/${SEARCH_POSTS_PATH}/${encodeURIComponent(key)}.json`;
    }

    function normalizeChatData(data) {
      const messages = Object.values(data || {})
        .filter(message => message && message.text)
        .map(message => ({
          name: String(message.name || "익명").slice(0, 12),
          text: String(message.text || "").slice(0, 200),
          userId: String(message.userId || ""),
          createdAt: Number(message.createdAt || 0)
        }))
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0))
        .slice(-MAX_CHAT_MESSAGES);

      return messages;
    }

    async function fetchChatMessages() {
      const response = await fetch(getChatRestUrl(), {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        const message = await response.text().catch(() => "");
        throw new Error(`채팅 읽기 실패: HTTP ${response.status} ${message}`);
      }

      const data = await response.json();
      return normalizeChatData(data);
    }

    async function sendChatMessage(message) {
      const response = await fetch(getChatRestUrl(), {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(message)
      });

      if (!response.ok) {
        const errorMessage = await response.text().catch(() => "");
        throw new Error(`채팅 전송 실패: HTTP ${response.status} ${errorMessage}`);
      }

      return response.json();
    }

    async function fetchSearchPosts() {
      const response = await fetch(getSearchPostsRestUrl(), {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        const message = await response.text().catch(() => "");
        throw new Error(`검색 데이터 읽기 실패: HTTP ${response.status} ${message}`);
      }

      const data = await response.json();
      return normalizeSearchPostData(data);
    }

    async function saveChatMessageToSearch(chatMessageKey, message) {
      const searchPost = convertChatMessageToSearchPost(message, chatMessageKey);
      const response = await fetch(getSearchPostRestUrl(chatMessageKey || `search_${Date.now()}`), {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(searchPost)
      });

      if (!response.ok) {
        const errorMessage = await response.text().catch(() => "");
        throw new Error(`검색 데이터 저장 실패: HTTP ${response.status} ${errorMessage}`);
      }

      return response.json();
    }

    async function refreshSearchPosts() {
      try {
        const searchPosts = await fetchSearchPosts();
        const signature = JSON.stringify(searchPosts);

        if (signature !== lastRenderedSearchPostsSignature) {
          lastRenderedSearchPostsSignature = signature;
          firebaseSearchPosts = searchPosts;

          if (searchInput.value.trim()) {
            render();
          }
        }
      } catch (error) {
        console.warn("검색용 데이터 동기화 실패", error);
      }
    }

    async function refreshChatMessages() {
      try {
        const messages = await fetchChatMessages();
        const signature = JSON.stringify(messages);

        firebaseChatReady = true;
        if (!chatSend.disabled) {
          setChatStatus("공개 채팅방 연결됨");
        }

        if (signature !== lastRenderedChatSignature) {
          lastRenderedChatSignature = signature;
          renderChatMessages(messages);
        }

        await refreshSearchPosts();
      } catch (error) {
        firebaseChatReady = false;
        setChatStatus("연결 실패: DB 규칙 확인 필요");
        chatMessages.innerHTML = `<div class="chat-empty">채팅을 불러오지 못했습니다.<br>Firebase Realtime Database Rules를 확인해 주세요.</div>`;
        console.error(error);
      }
    }

    function startFirebaseChatMode() {
      setChatStatus("공개 채팅방 연결 시도 중...");
      chatMessages.innerHTML = `<div class="chat-empty">채팅 서버에 연결 중입니다.<br>잠시만 기다려 주세요.</div>`;

      refreshChatMessages();

      if (chatRefreshTimer) {
        clearInterval(chatRefreshTimer);
      }

      chatRefreshTimer = setInterval(refreshChatMessages, 2000);

      chatForm.addEventListener("submit", async event => {
        event.preventDefault();
        const { rawName, rawText, name, text } = getCleanChatInput();

        if (!text) {
          return;
        }

        if (!isValidChatName(rawName)) {
          rejectBlockedChatName();
          return;
        }

        if (containsBlockedExpression(rawText)) {
          rejectBlockedChatMessage();
          return;
        }

        localStorage.setItem(CHAT_NAME_KEY, name);
        chatSend.disabled = true;
        setChatStatus("전송 중...");

        try {
          const message = {
            name,
            text,
            userId: myChatId,
            createdAt: Date.now()
          };
          const result = await waitWithTimeout(sendChatMessage(message), 10000);

          await waitWithTimeout(
            saveChatMessageToSearch(result && result.name ? result.name : `search_${message.createdAt}`, message),
            10000
          ).catch(error => {
            console.warn("채팅은 전송됐지만 검색 데이터 저장에 실패했습니다.", error);
          });

          chatText.value = "";
          chatText.focus();
          await refreshChatMessages();
          setChatStatus("공개 채팅방 연결됨");
        } catch (error) {
          setChatStatus("전송 실패: DB 규칙 확인 필요");
          console.error(error);
        } finally {
          chatSend.disabled = false;
        }
      });
    }

    if (hasFirebaseConfig()) {
      startFirebaseChatMode();
    } else {
      startLocalChatMode();
    }


    renderPopularKeywords();
    render();
  </script>
</body>
</html>
